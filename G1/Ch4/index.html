<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 1: इ की मात्रा का रोमांचक खेल</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fef08a, #bbf7d0);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
        }

        /* 1. Splash Screen */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-in-out;
        }

        #splash-screen img {
            max-width: 250px;
            height: auto;
            margin-bottom: 20px;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #16a34a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Game Shell Container */
        #game-container {
            width: 95%;
            max-width: 800px;
            height: 550px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            padding: 20px;
            display: none;
            position: relative;
            flex-direction: column;
        }

        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #f1f5f9;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .level-title {
            color: #1e293b;
            font-size: 22px;
            font-weight: 700;
        }

        .stats {
            font-size: 18px;
            font-weight: bold;
            color: #059669;
            background: #ecfdf5;
            padding: 5px 15px;
            border-radius: 20px;
        }

        /* Canvas-like Gameplay Arenas */
        .stage-arena {
            flex: 1;
            position: relative;
            background: #f8fafc;
            border-radius: 16px;
            overflow: hidden;
            display: none;
        }

        /* --- LEVEL 1: BALLOON STYLE --- */
        .balloon {
            position: absolute;
            width: 85px;
            height: 105px;
            background: #ff7043;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 18px;
            font-weight: bold;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.15);
            animation: floatUp var(--speed) linear infinite;
            bottom: -120px;
        }
        .balloon::after {
            content: "";
            position: absolute;
            bottom: -8px;
            left: 38px;
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-bottom: 8px solid currentColor;
            transform: rotate(180deg);
        }

        @keyframes floatUp {
            0% { bottom: -120px; }
            100% { bottom: 560px; }
        }

        /* --- LEVEL 2: CATCHING STYLE --- */
        .falling-word {
            position: absolute;
            padding: 8px 16px;
            background: white;
            border: 2px solid #3b82f6;
            color: #1e3a8a;
            border-radius: 12px;
            font-weight: bold;
            font-size: 20px;
            top: -50px;
        }

        #basket {
            position: absolute;
            bottom: 10px;
            left: 45%;
            width: 100px;
            height: 45px;
            background: #b45309;
            border-radius: 0 0 25px 25px;
            border: 4px solid #78350f;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
        }

        /* --- LEVEL 3: RACING STYLE --- */
        #racing-arena {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            background: #eff6ff;
        }

        .track-box {
            font-size: 32px;
            letter-spacing: 5px;
            background: white;
            padding: 20px 40px;
            border-radius: 15px;
            border: 3px dashed #3b82f6;
            font-weight: bold;
        }

        .race-btn-grid {
            display: flex;
            gap: 15px;
        }

        .race-opt {
            padding: 15px 30px;
            background: #3b82f6;
            color: white;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Results Display */
        #results-screen {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            height: 100%;
        }

        .btn-action {
            padding: 12px 30px;
            background: #10b981;
            color: white;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <!-- Audio Pipelines -->
    <audio id="snd-correct" src="assets/correct.mp3" preload="auto"></audio>
    <audio id="snd-wrong" src="assets/wrong.mp3" preload="auto"></audio>

    <!-- Splash Screen Screen -->
    <div id="splash-screen">
        <img src="assets/innovine-logo.png" alt="Innovine Logo">
        <div class="loader"></div>
    </div>

    <!-- Master Game Wrapper -->
    <div id="game-container">
        <div class="header-panel">
            <div class="level-title" id="level-indicator">स्तर १: गुब्बारा फोड़ो (इ मात्रा वाले शब्द)</div>
            <div class="stats">अंक (Score): <span id="score-val">0</span></div>
        </div>

        <!-- LEVEL 1 STAGE ARENA -->
        <div class="stage-arena" id="balloon-arena"></div>

        <!-- LEVEL 2 STAGE ARENA -->
        <div class="stage-arena" id="catching-arena">
            <div id="basket">टोकरी</div>
        </div>

        <!-- LEVEL 3 STAGE ARENA -->
        <div class="stage-arena" id="racing-arena">
            <div style="font-size: 18px; color: #475569; font-weight: bold;">खाली जगह में कौन सी मात्रा (f) आएगी? गाड़ी दौड़ाएं!</div>
            <div class="track-box" id="race-word-display">_ कसान</div>
            <div class="race-btn-grid" id="race-options"></div>
        </div>

        <!-- SCORE SUMMARY / RESTART -->
        <div id="results-screen">
            <h2 style="color: #059669; font-size: 36px; margin-bottom: 10px;">अद्भुत खेल! 🎉</h2>
            <p style="font-size: 20px; color: #475569;" id="final-status-msg"></p>
            <button class="btn-action" onclick="resetToBeginning()">फिर से खेलें (Restart)</button>
        </div>
    </div>

    <script>
        // Core Game Database based entirely on Chapter 4
        const matraWords = ["इमली", "इनाम", "इडली", "इमारत", "गिलास", "किताब", "तित利", "दिन", "चिड़िया", "हिरन", "किसान", "सितार"]; // Correct answers[cite: 1]
        const wrongMatraWords = ["आम", "माला", "मछली", "दूध", "फूल", "पेड़", "शेर", "मोर", "बंदर", "चूहा"]; // Distractors

        let totalScore = 0;
        let currentLevel = 1;
        let gameLoops = [];
        
        const correctAudio = document.getElementById('snd-correct');
        const wrongAudio = document.getElementById('snd-wrong');

        // Manage Entry Window Sequence (5 Second Target Duration)
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = 0;
                setTimeout(() => {
                    splash.style.display = 'none';
                    document.getElementById('game-container').style.display = 'flex';
                    startLevelOne();
                }, 500);
            }, 5000);
        });

        function playSound(isCorrect) {
            const target = isCorrect ? correctAudio : wrongAudio;
            target.currentTime = 0;
            target.play().catch(e => console.log("Audio waiting for window interactions..."));
        }

        function clearAllIntervals() {
            gameLoops.forEach(clearInterval);
            gameLoops = [];
        }

        // ==========================================
        // LEVEL 1: BALLOON POPPING
        // ==========================================
        function startLevelOne() {
            currentLevel = 1;
            document.getElementById('level-indicator').innerText = "स्तर १: गुब्बारा फोड़ो (इ मात्रा वाले शब्द)";
            const arena = document.getElementById('balloon-arena');
            arena.style.display = "block";
            arena.innerHTML = "";

            let itemsSpawned = 0;
            const balloonColors = ['#ff5252', '#3b82f6', '#ec4899', '#f59e0b', '#a855f7'];

            let spawnTimer = setInterval(() => {
                if (itemsSpawned >= 15) {
                    clearInterval(spawnTimer);
                    setTimeout(transitionToLevelTwo, 5000); // Transition out after final balloon floats clear
                    return;
                }

                const isCorrectWord = Math.random() > 0.4;
                const textStr = isCorrectWord ? matraWords[Math.floor(Math.random() * matraWords.length)] : wrongMatraWords[Math.floor(Math.random() * wrongMatraWords.length)];

                const balloon = document.createElement('div');
                balloon.className = 'balloon';
                balloon.innerText = textStr;
                balloon.style.left = Math.random() * (arena.clientWidth - 90) + "px";
                balloon.style.setProperty('--speed', (4 + Math.random() * 3) + "s");
                balloon.style.backgroundColor = balloonColors[Math.floor(Math.random() * balloonColors.length)];

                balloon.onclick = () => {
                    if (isCorrectWord) {
                        playSound(true);
                        totalScore += 10;
                    } else {
                        playSound(false);
                        totalScore = Math.max(0, totalScore - 5);
                    }
                    document.getElementById('score-val').innerText = totalScore;
                    balloon.remove();
                };

                arena.appendChild(balloon);
                itemsSpawned++;
            }, 1000);

            gameLoops.push(spawnTimer);
        }

        // ==========================================
        // LEVEL 2: CATCHING THE INGREDIENTS
        // ==========================================
        function transitionToLevelTwo() {
            clearAllIntervals();
            document.getElementById('balloon-arena').style.display = "none";
            
            document.getElementById('level-indicator').innerText = "स्तर २: टोकरी में पकड़ो ('इ' की ध्वनि वाले शब्द)";
            const arena = document.getElementById('catching-arena');
            arena.style.display = "block";

            const basket = document.getElementById('basket');
            
            // Mouse tracking control setup
            arena.onmousemove = (e) => {
                const rect = arena.getBoundingClientRect();
                let x = e.clientX - rect.left - (basket.clientWidth / 2);
                x = Math.max(0, Math.min(x, arena.clientWidth - basket.clientWidth));
                basket.style.left = x + "px";
            };

            let dropsSpawned = 0;
            let catchTimer = setInterval(() => {
                if (dropsSpawned >= 12) {
                    clearInterval(catchTimer);
                    setTimeout(transitionToLevelThree, 4000);
                    return;
                }

                const isCorrectWord = Math.random() > 0.4;
                const textStr = isCorrectWord ? matraWords[Math.floor(Math.random() * matraWords.length)] : wrongMatraWords[Math.floor(Math.random() * wrongMatraWords.length)];

                const wordObj = document.createElement('div');
                wordObj.className = 'falling-word';
                wordObj.innerText = textStr;
                wordObj.style.left = Math.random() * (arena.clientWidth - 120) + "px";
                arena.appendChild(wordObj);

                let currentTop = -50;
                let fallSpeed = 3 + Math.random() * 3;

                let animationFrame = setInterval(() => {
                    currentTop += fallSpeed;
                    wordObj.style.top = currentTop + "px";

                    // Check boundaries / overlaps with matching tool logic
                    const basketRect = basket.getBoundingClientRect();
                    const wordRect = wordObj.getBoundingClientRect();

                    if (wordRect.bottom >= basketRect.top && 
                        wordRect.right >= basketRect.left && 
                        wordRect.left <= basketRect.right && 
                        wordRect.top <= basketRect.bottom) {
                        
                        clearInterval(animationFrame);
                        wordObj.remove();

                        if (isCorrectWord) {
                            playSound(true);
                            totalScore += 10;
                        } else {
                            playSound(false);
                            totalScore = Math.max(0, totalScore - 5);
                        }
                        document.getElementById('score-val').innerText = totalScore;
                    }

                    // Fall past frame logic
                    if (currentTop > arena.clientHeight) {
                        clearInterval(animationFrame);
                        wordObj.remove();
                    }
                }, 20);

                dropsSpawned++;
            }, 1200);

            gameLoops.push(catchTimer);
        }

        // ==========================================
        // LEVEL 3: RACING MATRA SPELLING
        // ==========================================
        let racingIndex = 0;
        const racingQuestions = [
            { display: "_ कसान", solution: "ि", options: ["ि", "ी", "ा"] }, //[cite: 1]
            { display: "क _ ताब", solution: "ि", options: ["ु", "ि", "ो"] }, //[cite: 1]
            { display: "च _ ड़िया", solution: "ि", options: ["ी", "ै", "ि"] }, //[cite: 1]
            { display: "ग _ लास", solution: "ि", options: ["ि", "ा", "ू"] } //[cite: 1]
        ];

        function transitionToLevelThree() {
            clearAllIntervals();
            document.getElementById('catching-arena').style.display = "none";
            document.getElementById('level-indicator').innerText = "स्तर ३: अक्षर रेस (खाली स्थान भरो)";
            document.getElementById('racing-arena').style.display = "flex";
            
            racingIndex = 0;
            loadRacingPrompt();
        }

        function loadRacingPrompt() {
            if (racingIndex >= racingQuestions.length) {
                concludeGamePlay();
                return;
            }

            const activeQ = racingQuestions[racingIndex];
            document.getElementById('race-word-display').innerText = activeQ.display;
            
            const btnBox = document.getElementById('race-options');
            btnBox.innerHTML = "";

            activeQ.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "race-opt";
                btn.innerText = opt;
                btn.onclick = () => processRaceAnswer(opt, activeQ.solution);
                btnBox.appendChild(btn);
            });
        }

        function processRaceAnswer(chosen, exactAns) {
            if (chosen === exactAns) {
                playSound(true);
                totalScore += 15;
            } else {
                playSound(false);
                totalScore = Math.max(0, totalScore - 5);
            }
            document.getElementById('score-val').innerText = totalScore;
            racingIndex++;
            loadRacingPrompt();
        }

        // ==========================================
        // FINAL ENDGAME CONCLUSION
        // ==========================================
        function concludeGamePlay() {
            clearAllIntervals();
            document.getElementById('racing-arena').style.display = "none";
            document.getElementById('level-indicator').innerText = "खेल पूरा हुआ!";
            
            const summary = document.getElementById('results-screen');
            summary.style.display = "flex";
            document.getElementById('final-status-msg').innerHTML = `शानदार प्रयास! आपका कुल स्कोर रहा: <strong>${totalScore} अंक</strong>।`;
        }

        function resetToBeginning() {
            totalScore = 0;
            document.getElementById('score-val').innerText = totalScore;
            document.getElementById('results-screen').style.display = "none";
            startLevelOne();
        }
    </script>
</body>
</html>
