<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>इ की मात्रा (f) का खेल</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0f2fe, #f0fdf4);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 1. Splash Screen */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-in-out;
        }

        #splash-screen img {
            max-width: 250px;
            height: auto;
            margin-bottom: 20px;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #0284c7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 2. Main Game Container */
        #game-container {
            width: 90%;
            max-width: 700px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 30px;
            text-align: center;
            display: none;
        }

        h1 {
            color: #0369a1;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .score-board {
            font-size: 18px;
            color: #475569;
            margin-bottom: 25px;
            font-weight: bold;
        }

        /* Word Building UI */
        .game-panel {
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 25px;
        }

        .question-hint {
            font-size: 22px;
            color: #1e293b;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .word-slots {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .slot {
            width: 65px;
            height: 65px;
            border: 3px solid #94a3b8;
            border-radius: 10px;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            font-weight: bold;
            color: #0f172a;
        }

        .slot.missing {
            border: 3px dashed #0284c7;
            background: #f0f9ff;
        }

        .slot.correct-drop {
            border-color: #22c55e;
            background: #f0fdf4;
            color: #15803d;
        }

        /* Draggable Options */
        .options-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            min-height: 70px;
        }

        .matra-card {
            padding: 12px 25px;
            background: #0284c7;
            color: white;
            font-size: 24px;
            font-weight: bold;
            border-radius: 10px;
            cursor: grab;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            user-select: none;
            transition: transform 0.2s, background 0.2s;
        }

        .matra-card:hover {
            transform: translateY(-2px);
            background: #0369a1;
        }

        .matra-card:active {
            cursor: grabbing;
        }

        /* Result Screen */
        #result-screen {
            display: none;
        }

        .btn-restart {
            padding: 12px 30px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }

        .btn-restart:hover {
            background: #16a34a;
        }
    </style>
</head>
<body>

    <!-- Audio Elements -->
    <audio id="audio-correct" src="assets/correct.mp3" preload="auto"></audio>
    <audio id="audio-wrong" src="assets/wrong.mp3" preload="auto"></audio>

    <!-- 1. Splash Screen Section -->
    <div id="splash-screen">
        <img src="assets/innovine-logo.png" alt="Innovine Logo">
        <div class="loader"></div>
    </div>

    <!-- 2. Main Interactive Game Section -->
    <div id="game-container">
        <h1>इ की मात्रा (f) जोड़ो!</h1>
        <div class="score-board">प्रश्न: <span id="current-idx">1</span>/5 | अंक: <span id="score">0</span></div>

        <div id="play-screen">
            <div class="game-panel">
                <div class="question-hint" id="question-hint">संकेत लोड हो रहा है...</div>
                
                <!-- Target Slots for the Word Construction -->
                <div class="word-slots" id="word-slots"></div>
            </div>

            <p style="color: #64748b; margin-bottom: 15px; font-weight: 500;">सही मात्रा या अक्षर को खाली डिब्बे (dashed box) में खींचकर लाएँ:</p>
            <div class="options-container" id="options-container"></div>
        </div>

        <!-- 3. Final Result Screen Inside Container -->
        <div id="result-screen">
            <h2 style="color: #15803d; font-size: 32px; margin-bottom: 15px;">बधाई हो! 🎉</h2>
            <p style="font-size: 22px; color: #334155; margin-bottom: 30px;">आपने खेल पूरा कर लिया है। कुल अंक: <span id="final-score">0</span>/5</p>
            <button class="btn-restart" onclick="restartGame()">फिर से खेलें</button>
        </div>
    </div>

    <script>
        // Game Dataset containing fresh content direct from Chapter 4 context
        const questions = [
            {
                hint: "१. हम इसमें पानी पीते हैं:",
                // Meaning "गिलास". The 'ि' matra needs to be dropped before 'ग'
                slots: [{text: "", missing: true}, {text: "ग"}, {text: "ला"}, {text: "स"}],
                answer: "ि",
                options: ["ि", "ी", "ा", "ु"]
            },
            {
                hint: "२. पक्षी रहने के लिए पेड़ पर क्या बनाते हैं?",
                // Meaning "घोंसला / चिड़िया". Let's build 'चिड़िया'. Missing 'ि' before 'च'
                slots: [{text: "", missing: true}, {text: "च"}, {text: "ड़ि"}, {text: "या"}],
                answer: "ि",
                options: ["ा", "ि", "ो", "ू"]
            },
            {
                hint: "३. एक फल जिसमें बाहर कड़ा छिलका और अंदर पानी होता है:",
                // Meaning "नारियल". Missing 'ि' before 'र'
                slots: [{text: "ना"}, {text: "", missing: true}, {text: "र"}, {text: "य"}, {text: "ल"}],
                answer: "ि",
                options: ["ी", "ु", "ि", "े"]
            },
            {
                hint: "४. भारत का राष्ट्रीय ध्वज:",
                // Meaning "तिरंगा". Missing 'ि' before 'त'
                slots: [{text: "", missing: true}, {text: "त"}, {text: "रं"}, {text: "गा"}],
                answer: "ि",
                options: ["ि", "ी", "ै", "ौ"]
            },
            {
                hint: "५. पढ़ने के लिए काम आने वाली वस्तु:",
                // Meaning "किताब". Missing 'ि' before 'क'
                slots: [{text: "", missing: true}, {text: "क"}, {text: "ता"}, {text: "ब"}],
                answer: "ि",
                options: ["ु", "ा", "ो", "ि"]
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let draggedValue = null;

        // Audio Triggers
        const correctSound = document.getElementById('audio-correct');
        const wrongSound = document.getElementById('audio-wrong');

        // Splash Screen Logic: Show logo exactly for 5000ms (5 seconds)
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = 0;
                setTimeout(() => {
                    splash.style.display = 'none';
                    document.getElementById('game-container').style.display = 'block';
                    loadQuestion();
                }, 500);
            }, 5000); 
        });

        // Initialize and Load Question Data
        function loadQuestion() {
            if (currentQuestionIndex >= questions.length) {
                showResults();
                return;
            }

            const q = questions[currentQuestionIndex];
            document.getElementById('current-idx').innerText = currentQuestionIndex + 1;
            document.getElementById('score').innerText = score;
            document.getElementById('question-hint').innerText = q.hint;

            // Generate slots UI
            const slotsContainer = document.getElementById('word-slots');
            slotsContainer.innerHTML = '';
            
            q.slots.forEach(slotData => {
                const slotDiv = document.createElement('div');
                slotDiv.classList.add('slot');
                if (slotData.missing) {
                    slotDiv.classList.add('missing');
                    // Add Drag and Drop Listeners to Target Element
                    slotDiv.addEventListener('dragover', dragOver);
                    slotDiv.addEventListener('drop', dropElement);
                } else {
                    slotDiv.innerText = slotData.text;
                }
                slotsContainer.appendChild(slotDiv);
            });

            // Generate Draggable Options Cards
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            q.options.forEach(opt => {
                const card = document.createElement('div');
                card.classList.add('matra-card');
                card.setAttribute('draggable', 'true');
                card.innerText = opt;
                
                card.addEventListener('dragstart', (e) => {
                    draggedValue = opt;
                });
                
                optionsContainer.appendChild(card);
            });
        }

        // Drag handlers
        function dragOver(e) {
            e.preventDefault();
        }

        function dropElement(e) {
            e.preventDefault();
            const currentQ = questions[currentQuestionIndex];

            if (draggedValue === currentQ.answer) {
                // Correct Choice Path
                correctSound.currentTime = 0;
                correctSound.play().catch(err => console.log("Audio play blocked by browser validation metrics."));
                
                score++;
                e.target.innerText = draggedValue;
                e.target.classList.remove('missing');
                e.target.classList.add('correct-drop');

                setTimeout(() => {
                    currentQuestionIndex++;
                    loadQuestion();
                }, 1200);
            } else {
                // Wrong Choice Path
                wrongSound.currentTime = 0;
                wrongSound.play().catch(err => console.log("Audio play blocked by browser validation metrics."));
                
                // Visual feedback shaking or brief flash
                e.target.style.borderColor = '#ef4444';
                e.target.style.background = '#fef2f2';
                setTimeout(() => {
                    e.target.style.borderColor = '#0284c7';
                    e.target.style.background = '#f0f9ff';
                }, 800);
            }
        }

        function showResults() {
            document.getElementById('play-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('final-score').innerText = score;
        }

        function restartGame() {
            currentQuestionIndex = 0;
            score = 0;
            document.getElementById('play-screen').style.display = 'block';
            document.getElementById('result-screen').style.display = 'none';
            loadQuestion();
        }
    </script>
</body>
</html>
