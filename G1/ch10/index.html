<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>वैभव की सैर - 'ऐ' की मात्रा का खेल</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body { 
            font-family: 'Arial', sans-serif; 
            text-align: center; 
            background: linear-gradient(135deg, #ffedd5, #fed7aa); 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            cursor: pointer;
        }

        /* 1. Splash Screen */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.5s ease-in-out;
        }

        #splash-screen img {
            max-width: 260px;
            height: auto;
            margin-bottom: 20px;
        }

        .loader {
            width: 45px;
            height: 45px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #f97316;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .tap-hint {
            margin-top: 15px;
            font-size: 14px;
            color: #71717a;
            font-weight: 500;
        }

        /* 2. Main Game Container */
        #game-container { 
            display: none; 
            width: 95%;
            max-width: 850px; 
            margin: 20px auto; 
            padding: 30px; 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
        }

        .top-logo {
            max-width: 160px;
            height: auto;
            margin-bottom: 15px;
        }

        h1 {
            color: #c2410c;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .instruction {
            font-size: 18px;
            color: #3f3f46;
            margin-bottom: 25px;
        }

        .game-layout {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        /* Score & Tracker Box */
        .tracker-zone {
            background-color: #ffedd5;
            border: 3px dashed #f97316;
            padding: 20px;
            border-radius: 15px;
            width: 100%;
            max-width: 450px;
            margin-bottom: 20px;
        }

        .tracker-title {
            font-size: 22px;
            color: #c2410c;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .tracker-counter {
            font-size: 16px;
            color: #7c2d12;
        }

        /* Word Grid Setup */
        .word-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
            width: 100%;
        }

        .card { 
            padding: 25px 15px; 
            border: 2px solid #fed7aa; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 24px; 
            font-weight: bold;
            background: #fafafa;
            transition: all 0.2s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            background-color: #ffedd5;
            box-shadow: 0 6px 12px rgba(249, 115, 22, 0.15);
        }

        .card.disabled {
            background-color: #e4e4e7;
            border-color: #d4d4d8;
            color: #a1a1aa;
            cursor: not-allowed;
            transform: none;
        }

        .btn-reset { 
            padding: 12px 28px; 
            font-size: 18px; 
            cursor: pointer; 
            background: #f97316; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold;
            margin-top: 20px;
        }

        .btn-reset:hover {
            background: #ea580c;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- Audio Elements (Using precise asset paths provided in folder view) -->
    <audio id="sound-correct" src="assets/correct.mp3" preload="auto"></audio>
    <audio id="sound-wrong" src="assets/wrong.mp3" preload="auto"></audio>

    <!-- 1. Splash Screen Section (5 Seconds Lock) -->
    <div id="splash-screen">
        <img src="assets/innovine-logo.png" alt="Innovine Logo">
        <div class="loader"></div>
        <p class="tap-hint">साउंड शुरू करने के लिए स्क्रीन पर एक बार टच करें 👇</p>
    </div>

    <!-- 2. Master Game Platform -->
    <div id="game-container">
        <!-- Logo inside main template container -->
        <img src="assets/innovine-logo.png" alt="Innovine Logo" class="top-logo">
        
        <h1>प्र.१. 'ऐ' मात्रा वाले शब्दों की खोज 🔍</h1>
        
        <div id="level-1" class="game-layout">
            <p class="instruction"><strong>निर्देश:</strong> नीचे दिए गए शब्दों में से केवल उन शब्दों पर क्लिक करें जिनमें <strong>'ऐ' स्वर</strong> या <strong>'ै' की मात्रा</strong> है!</p>
            
            <!-- Target Collection Zone -->
            <div class="tracker-zone">
                <div class="tracker-title">🎒 वैभव का थैला</div>
                <div class="tracker-counter">थैले में इकट्ठे किए गए शब्द: <span id="score-display">0</span> / 6</div>
            </div>

            <!-- Vocabulary taken directly from the provided page text and images -->
            <div class="word-grid">
                <!-- Correct 'ऐ' words from textbook -->
                <div class="card" id="w1" onclick="checkWord(true, 'बैल', 'w1')">बैल</div>
                <div class="card" id="w2" onclick="checkWord(true, 'थैला', 'w2')">थैला</div>
                <!-- Distractors without double matra (like e matra) -->
                <div class="card" id="w3" onclick="checkWord(false, 'रेल', 'w3')">रेल</div>
                <div class="card" id="w4" onclick="checkWord(true, 'ऐनक', 'w4')">ऐनक</div>
                <div class="card" id="w5" onclick="checkWord(false, 'केला', 'w5')">केला</div>
                <div class="card" id="w6" onclick="checkWord(true, 'तैराक', 'w6')">तैराक</div>
                <div class="card" id="w7" onclick="checkWord(false, 'सेब', 'w7')">सेब</div>
                <div class="card" id="w8" onclick="checkWord(true, 'मैदान', 'w8')">मैदान</div>
                <div class="card" id="w9" onclick="checkWord(true, 'सैनिक', 'w9')">सैनिक</div>
            </div>
        </div>

        <!-- FINAL GAME END WRAPPER -->
        <div id="result-screen" class="hidden">
            <h2 id="msg" style="color: #c2410c; font-size: 30px; margin-bottom: 15px;"></h2>
            <button class="btn-reset" onclick="location.reload()">फिर से खेलें</button>
        </div>
    </div>

    <script>
        let correctAnswersCount = 0;
        const totalRequired = 6; // बैल, थैला, ऐनक, तैराक, मैदान, सैनिक

        const correctSnd = document.getElementById('sound-correct');
        const wrongSnd = document.getElementById('sound-wrong');

        // Global touch interaction handler to unlock web audio context upfront
        document.body.addEventListener('click', () => {
            correctSnd.play().then(() => { correctSnd.pause(); correctSnd.currentTime = 0; }).catch(e => console.log(e));
            wrongSnd.play().then(() => { wrongSnd.pause(); wrongSnd.currentTime = 0; }).catch(e => console.log(e));
        }, { once: true });

        // Splash screen handler: Holds for exactly 5000 milliseconds
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = 0;
                setTimeout(() => {
                    splash.style.display = 'none';
                    document.getElementById('game-container').style.display = 'block';
                }, 500);
            }, 5000);
        });

        function checkWord(isCorrect, wordText, cardId) {
            const selectedCard = document.getElementById(cardId);
            
            if (selectedCard.classList.contains('disabled')) return;

            if(isCorrect) {
                correctSnd.currentTime = 0;
                correctSnd.play().catch(err => console.log("Audio blocked:", err));
                
                correctAnswersCount++;
                document.getElementById('score-display').innerText = correctAnswersCount;
                
                selectedCard.classList.add('disabled');
                selectedCard.style.border = "2px solid #f97316";
                selectedCard.style.backgroundColor = "#ffedd5";
                
                alert("बहुत बढ़िया! \"" + wordText + "\" में 'ऐ' की मात्रा है और यह थैले में आ गया।");
            } else {
                wrongSnd.currentTime = 0;
                wrongSnd.play().catch(err => console.log("Audio blocked:", err));
                
                alert("सोचिए! \"" + wordText + "\" में 'ऐ' की मात्रा नहीं है। दोबारा प्रयास करें!");
            }

            // Check if win condition met
            if(correctAnswersCount >= totalRequired) {
                setTimeout(() => {
                    document.getElementById('level-1').classList.add('hidden');
                    document.getElementById('result-screen').classList.remove('hidden');
                    document.getElementById('msg').innerHTML = "शानदार! 🎉<br>आपने 'ऐ' मात्रा वाले सभी सही शब्दों को खोज लिया है।";
                }, 500);
            }
        }
    </script>
</body>
</html>
