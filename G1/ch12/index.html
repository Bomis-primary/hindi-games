<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>मात्रा मेला 🎪</title>
    <style>
        :root {
            --bubblegum: #ff758f;
            --sky: #4cc9f0;
            --grass: #2ecc71;
            --sunshine: #ffb703;
            --purple: #9b5de5;
            --coral: #ff6b6b;
            --background: #fff0f3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Comic Sans MS', 'Segoe UI', Arial, sans-serif;
            background-color: var(--background);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
            padding: 10px;
            position: relative;
        }

        .game-screen {
            display: none;
            width: 100%;
            max-width: 800px;
            min-height: 85vh;
            background: white;
            border-radius: 35px;
            padding: 25px 20px;
            box-shadow: 0 15px 0 rgba(255, 117, 143, 0.15), 0 25px 50px rgba(0,0,0,0.08);
            text-align: center;
            border: 6px solid var(--bubblegum);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: fadeIn 0.4s ease-out;
        }

        .game-screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }

        /* LOGO SCREEN */
        #screen-logo {
            background: #ffffff;
            border-color: #f0f0f0;
        }
        .logo-img {
            max-width: 75%;
            max-height: 45vh;
            object-fit: contain;
            animation: pulseLogo 2s infinite ease-in-out;
        }
        @keyframes pulseLogo {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        /* TYPOGRAPHY & BUTTONS */
        h1 {
            color: #ff477e;
            font-size: calc(2.2rem + 1.2vw);
            margin-bottom: 15px;
            text-shadow: 2px 2px 0px #ffe5ec;
        }

        .action-btn {
            background: var(--grass);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: calc(1.4rem + 0.5vw);
            font-weight: bold;
            border-radius: 40px;
            box-shadow: 0 8px 0 #27ae60;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            margin-top: 15px;
            display: inline-block;
        }
        .action-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #27ae60;
        }
        .action-btn.blue-btn {
            background: var(--sky);
            box-shadow: 0 8px 0 #0096c7;
        }
        .action-btn.blue-btn:active {
            box-shadow: 0 2px 0 #0096c7;
        }

        /* INSTRUCTIONS GRID */
        .instruction-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            margin-bottom: 15px;
        }
        .instruction-card {
            background: #fff0f3;
            border: 3px dashed var(--bubblegum);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
        }
        .instruction-card .icon {
            font-size: 2.2rem;
            background: white;
            padding: 8px;
            border-radius: 15px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.05);
        }
        .instruction-card .text {
            font-size: calc(0.95rem + 0.3vw);
            color: #444;
            font-weight: bold;
            line-height: 1.3;
        }

        /* STATUS BAR */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 5px;
            margin-bottom: 12px;
            font-size: calc(1.2rem + 0.5vw);
            font-weight: bold;
        }
        .heart-box {
            color: #ff477e;
        }
        .score-box {
            background: #fff3cd;
            color: #856404;
            padding: 5px 15px;
            border-radius: 15px;
            border: 2px solid #ffeeba;
        }

        /* MAP TRACK */
        .map-track {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            align-items: center;
            background: #fff5f6;
            padding: 12px 5px;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 3px dashed #ffb3c1;
            position: relative;
            width: 100%;
            gap: 2px;
        }
        .map-tile {
            height: calc(28px + 2.5vw);
            background: #e2e8f0;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: calc(0.6rem + 0.4vw);
            font-weight: bold;
            color: white;
            z-index: 5;
            box-shadow: 0 3px 0 #cbd5e1;
            transition: background 0.3s;
        }
        .map-tile.passed {
            background: var(--grass);
            box-shadow: 0 3px 0 #27ae60;
        }
        .map-tile.finish-gate {
            background: var(--purple);
            border-radius: 12px;
            box-shadow: 0 3px 0 #7b2cbf;
        }
        .pawn-avatar {
            font-size: calc(1.5rem + 1.8vw);
            position: absolute;
            top: calc(-10px - 1vw);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.3);
            z-index: 10;
        }

        /* DISPLAY CARD */
        .display-box {
            background: #f8f9fa;
            border: 5px solid var(--sky);
            border-radius: 25px;
            padding: 15px 10px;
            margin-bottom: 15px;
            box-shadow: 0 8px 0 #bde0fe;
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .mode-badge {
            display: inline-block;
            padding: 4px 14px;
            font-size: calc(0.9rem + 0.3vw);
            font-weight: bold;
            color: white;
            border-radius: 12px;
            margin-bottom: 8px;
        }
        .card-image {
            max-height: 140px;
            width: auto;
            object-fit: contain;
            margin-bottom: 8px;
            border-radius: 12px;
        }
        .giant-emoji {
            font-size: calc(3.5rem + 3vw); 
            margin-bottom: 5px;
            display: block;
        }
        .math-spell {
            font-size: calc(1.6rem + 1vw);
            font-weight: bold;
            color: #333;
        }

        /* CHOICES */
        .choices-layout {
            display: flex;
            gap: 15px;
            width: 100%;
            justify-content: center;
        }
        .choice-card {
            background: white;
            border: 5px solid var(--sunshine);
            border-radius: 22px;
            padding: 12px 5px;
            font-size: calc(1.6rem + 1.2vw);
            font-weight: bold;
            color: #212529;
            cursor: pointer;
            flex: 1;
            box-shadow: 0 8px 0 #fb8500;
            transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.3s, border-color 0.3s;
            outline: none;
        }
        .choice-card:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #fb8500;
        }
        .choice-card.alt-color {
            border-color: var(--sky);
            box-shadow: 0 8px 0 #4361ee;
        }
        .choice-card.alt-color:active {
            box-shadow: 0 2px 0 #4361ee;
        }

        /* HINT GLOW */
        .choice-card.glow-hint {
            animation: intenseGlow 1.2s infinite alternate;
            border-color: #00ff88 !important;
        }
        @keyframes intenseGlow {
            0% { transform: scale(1); box-shadow: 0 0 10px #00ff88, 0 8px 0 #27ae60; }
            100% { transform: scale(1.04); box-shadow: 0 0 25px #00ff88, 0 8px 0 #27ae60; }
        }

        /* CONFETTI */
        .confetti-piece {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 4px;
            pointer-events: none;
            z-index: 99;
            animation: explodeParticles 0.8s forwards cubic-bezier(0.1, 0.8, 0.3, 1);
        }
        @keyframes explodeParticles {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) rotate(var(--r)) scale(0); opacity: 0; }
        }

        .screen-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            border-radius: 30px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        @media (max-width: 500px) {
            body { padding: 5px; }
            .game-screen { padding: 15px 10px; }
            .instruction-grid { grid-template-columns: 1fr; gap: 8px; }
            .choices-layout { flex-direction: column; gap: 10px; }
            .choice-card { padding: 10px 5px; }
            .card-image { max-height: 110px; }
        }
    </style>
</head>
<body>

    <!-- LOGO SCREEN -->
    <div id="screen-logo" class="game-screen active">
        <img src="assets/innovine-logo.png" alt="Innovine Logo" class="logo-img" onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='block';">
        <h2 id="logo-fallback" style="display:none; font-size: 2.5rem; color: #333;">Innovine Media</h2>
    </div>

    <!-- TITLE SCREEN -->
    <div id="screen-title" class="game-screen">
        <span style="font-size: 4.5rem; margin-bottom: 10px;">🎪</span>
        <h1>मात्रा मेला</h1>
        <p style="font-size: 1.3rem; color: #666; margin-bottom: 20px;">आओ मिलकर <b>औ (ौ)</b> मात्रा सीखें!</p>
        <button class="action-btn" onclick="switchScreen('screen-title', 'screen-instructions')">शुरू करें 🚀</button>
    </div>

    <!-- INSTRUCTIONS SCREEN -->
    <div id="screen-instructions" class="game-screen">
        <h1>कैसे खेलें? 🎯</h1>
        <div class="instruction-grid">
            <div class="instruction-card">
                <span class="icon">👆</span>
                <span class="text">सही उत्तर वाले बटन को छुओ</span>
            </div>
            <div class="instruction-card">
                <span class="icon">🦁</span>
                <span class="text">सही जवाब पर शेर आगे बढ़ेगा</span>
            </div>
            <div class="instruction-card">
                <span class="icon">💡</span>
                <span class="text">गलत उत्तर होने पर बटन चमकेगा</span>
            </div>
            <div class="instruction-card">
                <span class="icon">❤️</span>
                <span class="text">आपके पास कुल 3 Lives हैं</span>
            </div>
        </div>
        <button class="action-btn blue-btn" onclick="initAudioAndStartGame()">खेलें 🎮</button>
    </div>

    <!-- GAME PLAY SCREEN -->
    <div id="screen-game" class="game-screen">
        <div class="status-bar">
            <div class="heart-box" id="heartBox">❤️ ❤️ ❤️</div>
            <div class="score-box" id="scoreBox">⭐ अंक: 0</div>
        </div>

        <div class="map-track" id="trackLine">
            <div class="pawn-avatar" id="heroPawn">🦁</div>
            <div class="map-tile passed" id="tile-0">शुरू</div>
            <div class="map-tile" id="tile-1">१</div>
            <div class="map-tile" id="tile-2">२</div>
            <div class="map-tile" id="tile-3">३</div>
            <div class="map-tile" id="tile-4">४</div>
            <div class="map-tile" id="tile-5">५</div>
            <div class="map-tile" id="tile-6">६</div>
            <div class="map-tile" id="tile-7">७</div>
            <div class="map-tile" id="tile-8">८</div>
            <div class="map-tile" id="tile-9">९</div>
            <div class="map-tile" id="tile-10">१०</div>
            <div class="map-tile finish-gate" id="tile-11">🏁</div>
        </div>

        <div class="display-box" id="mainDisplayCard">
            <span class="mode-badge" id="gameModeBadge">🖼️ चित्र पहचानो</span>
            <img id="cardImg" class="card-image" src="" alt="Level Asset" style="display: none;">
            <span class="giant-emoji" id="bigEmoji">🏃</span>
            <div class="math-spell" id="spellFormula">द + ौ + ड़</div>
        </div>

        <div class="choices-layout" id="buttonsLayout"></div>

        <div id="endScreen" class="screen-overlay" style="display: none;">
            <h2 id="endTitle" style="font-size: 3rem; margin-bottom: 10px;">🎉 जीत गए! 🥳</h2>
            <p id="endDesc" style="font-size: 1.4rem; color: #555; margin-bottom: 25px;">अद्भुत खेल!</p>
            <button class="action-btn" onclick="resetGame()">फिर खेलें 🔄</button>
        </div>
    </div>

<script>
    const audioCorrect = new Audio('assets/correct.mp3');
    const audioWrong = new Audio('assets/wrong.mp3');
    const audioClaps = new Audio('assets/freesound_community-claps-44774.mp3');

    // Questions pool updated with 'चौकोर' and Chitra-Jodo Mode
    const baseLevels = [
        { type: "jodo", img: "daud.png", fallbackEmoji: "🏃", math: "द + ौ + ड़", correct: "दौड़", choices: ["दोड़", "दौड़"] },
        { type: "chitra", img: "aurat.png", fallbackEmoji: "👩", math: "यह कौन है?", correct: "औरत", choices: ["औरत", "ओरत"] },
        { type: "pehchano", img: "mausa.png", fallbackEmoji: "👨", math: "सही शब्द छुओ", correct: "मौसा", choices: ["मोसा", "मौसा"] },
        { type: "chitra", img: "mausi.png", fallbackEmoji: "👩‍🦱", math: "यह कौन है?", correct: "मौसी", choices: ["मोसी", "मौसी"] },
        { type: "pehchano", img: "fauji.png", fallbackEmoji: "🪖", math: "देश का वीर जवान", correct: "फ़ौजी", choices: ["फोजी", "फ़ौजी"] },
        { type: "chitra", img: "square.png", fallbackEmoji: "🔲", math: "च + ौ + क + ो + र", correct: "चौकोर", choices: ["चोकोर", "चौकोर"] },
        { type: "chitra", img: "daulat.png", fallbackEmoji: "💰", math: "सिक्के और धन", correct: "दौलत", choices: ["दौलत", "दोलत"] },
        { type: "pehchano", img: "naukar.png", fallbackEmoji: "🧑‍🍳", math: "घर का मददगार", correct: "नौकर", choices: ["नोकर", "नौकर"] },
        { type: "chitra", img: "hathoda.png", fallbackEmoji: "🔨", math: "कील ठोकने की चीज़", correct: "हथौड़ा", choices: ["हथोड़ा", "हथौड़ा"] },
        { type: "pehchano", img: "gauriya.png", fallbackEmoji: "🐦", math: "सुंदर छोटी चिड़िया", correct: "गौरैया", choices: ["गोरैया", "गौरैया"] }
    ];

    let activeLevels = [];
    let currentLevelIndex = 1;
    let totalLives = 3;
    let totalScore = 0;
    let wrongAttemptsOnLevel = 0;

    // Improved Fisher-Yates Full Shuffling
    function getFullShuffledArray(array) {
        let arr = JSON.parse(JSON.stringify(array));
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            switchScreen('screen-logo', 'screen-title');
        }, 3000);
    });

    function switchScreen(hideId, showId) {
        document.getElementById(hideId).classList.remove('active');
        document.getElementById(showId).classList.add('active');
        if(showId === 'screen-game') {
            alignPawn();
        }
    }

    function initAudioAndStartGame() {
        [audioCorrect, audioWrong, audioClaps].forEach(track => {
            track.play().catch(() => {});
            track.pause();
            track.currentTime = 0;
        });
        switchScreen('screen-instructions', 'screen-game');
        
        resetAndShuffleGame();
    }

    function resetAndShuffleGame() {
        // Completely randomize all 10 questions and their option choices on every restart
        activeLevels = getFullShuffledArray(baseLevels).map(level => {
            return {
                ...level,
                choices: getFullShuffledArray(level.choices)
            };
        });

        currentLevelIndex = 1;
        totalLives = 3;
        totalScore = 0;
        wrongAttemptsOnLevel = 0;

        const tiles = document.querySelectorAll('.map-tile');
        tiles.forEach((tile, index) => {
            if(index > 0) tile.classList.remove('passed');
        });

        renderStatusDisplays();
        alignPawn();
        loadChallenge();
    }

    function renderStatusDisplays() {
        const heartBox = document.getElementById('heartBox');
        let heartString = "";
        for(let i = 0; i < totalLives; i++) { heartString += "❤️ "; }
        if(heartString === "") heartString = "💔 खेल खत्म";
        heartBox.innerText = heartString;

        document.getElementById('scoreBox').innerText = `⭐ अंक: ${totalScore}`;
    }

    function alignPawn() {
        const pawn = document.getElementById('heroPawn');
        const activeTile = document.getElementById(`tile-${currentLevelIndex}`);
        if(!activeTile || !pawn) return;
        
        const centerOffset = activeTile.offsetLeft + (activeTile.offsetWidth / 2) - (pawn.offsetWidth / 2);
        pawn.style.left = `${centerOffset}px`;
    }

    function launchConfettiBurst() {
        const arenaCard = document.getElementById('mainDisplayCard');
        const particleColors = ['#ff758f', '#4cc9f0', '#2ecc71', '#ffb703', '#9b5de5', '#ff6b6b'];
        const totalParticles = window.innerWidth < 480 ? 25 : 40;

        for (let i = 0; i < totalParticles; i++) {
            const confettiPiece = document.createElement('div');
            confettiPiece.classList.add('confetti-piece');
            confettiPiece.style.backgroundColor = particleColors[Math.floor(Math.random() * particleColors.length)];
            confettiPiece.style.left = '50%';
            confettiPiece.style.top = '50%';

            const maxDist = window.innerWidth < 480 ? 160 : 300;
            const vectorX = (Math.random() - 0.5) * maxDist;
            const vectorY = (Math.random() - 0.6) * maxDist;
            const rotationRandom = Math.floor(Math.random() * 360) + 180;

            confettiPiece.style.setProperty('--x', `${vectorX}px`);
            confettiPiece.style.setProperty('--y', `${vectorY}px`);
            confettiPiece.style.setProperty('--r', `${rotationRandom}deg`);

            arenaCard.appendChild(confettiPiece);

            setTimeout(() => { confettiPiece.remove(); }, 800);
        }
    }

    function loadChallenge() {
        wrongAttemptsOnLevel = 0;
        
        if (currentLevelIndex > 10) {
            document.getElementById('tile-11').classList.add('passed');
            setTimeout(() => { triggerGameEnd(true); }, 500);
            return;
        }

        for (let i = 0; i < currentLevelIndex; i++) {
            const tile = document.getElementById(`tile-${i}`);
            if (tile) tile.classList.add('passed');
        }

        const currentData = activeLevels[currentLevelIndex - 1];
        const badge = document.getElementById('gameModeBadge');
        const cardBox = document.getElementById('mainDisplayCard');
        const cardImg = document.getElementById('cardImg');
        const bigEmoji = document.getElementById('bigEmoji');

        if(currentData.type === "jodo") {
            badge.innerText = "🧩 मात्रा जोड़ो";
            badge.style.backgroundColor = "var(--grass)";
            cardBox.style.borderColor = "var(--grass)";
            cardBox.style.boxShadow = "0 8px 0 #c2f0d5";
        } else if(currentData.type === "chitra") {
            badge.innerText = "🖼️ चित्र पहचानो";
            badge.style.backgroundColor = "var(--coral)";
            cardBox.style.borderColor = "var(--coral)";
            cardBox.style.boxShadow = "0 8px 0 #ffcccc";
        } else {
            badge.innerText = "🔍 सही शब्द चुनो";
            badge.style.backgroundColor = "var(--purple)";
            cardBox.style.borderColor = "var(--purple)";
            cardBox.style.boxShadow = "0 8px 0 #e1ccfa";
        }

        cardImg.src = `assets/${currentData.img}`;
        cardImg.style.display = "block";
        bigEmoji.style.display = "none";

        cardImg.onerror = function() {
            this.style.display = "none";
            bigEmoji.innerText = currentData.fallbackEmoji;
            bigEmoji.style.display = "block";
        };

        document.getElementById('spellFormula').innerText = currentData.math;

        const layout = document.getElementById('buttonsLayout');
        layout.innerHTML = "";
        
        currentData.choices.forEach((choice, idx) => {
            const colorClass = idx === 1 ? 'alt-color' : '';
            layout.innerHTML += `<button class="choice-card ${colorClass}" data-choice="${choice}" onclick="handleChoiceClick(this, '${choice}')">${choice}</button>`;
        });
    }

    function handleChoiceClick(buttonElement, selectedOption) {
        const currentData = activeLevels[currentLevelIndex - 1];
        
        if (selectedOption === currentData.correct) {
            audioCorrect.currentTime = 0;
            audioCorrect.play().catch(() => {});

            totalScore += 10;
            renderStatusDisplays();
            launchConfettiBurst();
            
            currentLevelIndex++;
            alignPawn();
            
            setTimeout(() => { loadChallenge(); }, 800);
        } else {
            audioWrong.currentTime = 0;
            audioWrong.play().catch(() => {});
            
            totalLives--;
            wrongAttemptsOnLevel++;
            renderStatusDisplays();

            if (wrongAttemptsOnLevel === 1) {
                const choiceBtns = document.querySelectorAll('.choice-card');
                choiceBtns.forEach(btn => {
                    if (btn.getAttribute('data-choice') === currentData.correct) {
                        btn.classList.add('glow-hint');
                    }
                });
            }

            if (totalLives <= 0) {
                setTimeout(() => { triggerGameEnd(false); }, 400);
            }
        }
    }

    function triggerGameEnd(isWin) {
        const screen = document.getElementById('endScreen');
        const title = document.getElementById('endTitle');
        const desc = document.getElementById('endDesc');
        
        screen.style.display = "flex";
        if (isWin) {
            audioClaps.currentTime = 0;
            audioClaps.play().catch(() => {});
            title.innerText = "🎉 जीत गए! 🥳";
            desc.innerText = `अद्भुत खेल! आपने बनाए कुल ${totalScore} अंक। शेर अपनी मंजिल तक पहुँच गया!`;
        } else {
            title.innerText = "ओहो! 💔";
            desc.innerText = `आपने शानदार प्रयास किया और ${totalScore} अंक बनाए! चलो फिर से कोशिश करते हैं!`;
        }
    }

    function resetGame() {
        document.getElementById('endScreen').style.display = "none";
        resetAndShuffleGame();
    }

    window.onresize = alignPawn;
</script>

</body>
</html>
