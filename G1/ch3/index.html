<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>मात्रा ज्ञान - आ की मात्रा (कक्षा 1)</title>
    <style>
        :root {
            --village-sky: #bae6fd;
            --grass-green: #4ade80;
            --sun-yellow: #fef08a;
            --mud-brown: #ca8a04;
            --clay-red: #f87171;
            --text-dark: #1e293b;
            --card-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Noto Sans Devanagari', system-ui, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(to bottom, var(--village-sky) 60%, var(--grass-green) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow-x: hidden;
        }

        /* STAGE 1: EXCLUSIVE 5-SECOND LOGO SPLASH SCREEN */
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        #splash img {
            width: 300px;
            max-width: 80%;
            animation: bouncePulse 2s infinite ease-in-out;
        }
        @keyframes bouncePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* GAME FRAMEWORK CONTAINER */
        .game-window {
            width: 100%;
            max-width: 850px;
            background: rgba(255, 255, 255, 0.95);
            border: 8px solid var(--sun-yellow);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            position: relative;
            text-align: center;
            min-height: 550px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hidden { display: none !important; }

        /* UI TYPOGRAPHY & HEADER ELEMENTS */
        h1 { color: #b91c1c; font-size: 2.3rem; margin-bottom: 5px; text-shadow: 2px 2px #fef08a; }
        h2 { color: #4338ca; font-size: 1.6rem; margin-bottom: 15px; }
        .subtitle { font-size: 1.1rem; color: #475569; margin-bottom: 20px; font-weight: bold; }
        
        .hud {
            display: flex;
            justify-content: space-between;
            background: #fef08a;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            color: #854d0e;
            margin-bottom: 20px;
            border: 2px solid #eab308;
        }

        /* VIBRANT INTERACTIVE BUTTON DESIGN */
        .btn-main {
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: white;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #dd6b20;
            transition: transform 0.1s;
        }
        .btn-main:active { transform: translateY(4px); box-shadow: 0 2px 0 #dd6b20; }

        /* ACTIVITY MECHANICS GRID STYLES */
        .letter-pool, .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .bubble-card {
            background: white;
            border: 4px solid #bfdbfe;
            border-radius: 20px;
            padding: 20px;
            font-size: 2.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 0 #bfdbfe;
        }
        .bubble-card:hover { transform: scale(1.05); background: #eff6ff; }

        /* DRAG AND DROP MATRIX DESIGN */
        .matching-matrix {
            display: flex;
            gap: 20px;
            justify-content: space-around;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        .drag-box, .drop-target {
            background: #f1f5f9;
            border: 3px dashed #cbd5e1;
            padding: 15px;
            border-radius: 15px;
            min-width: 140px;
            text-align: center;
        }
        .drag-item {
            background: #3b82f6;
            color: white;
            padding: 10px;
            border-radius: 10px;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: grab;
            margin: 5px 0;
        }
        .picture-node { font-size: 3rem; display: block; }

        /* VILLAGE PICTURE HUNT CANVAS MAP */
        .village-canvas {
            position: relative;
            width: 100%;
            height: 320px;
            background: url('https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?q=80&w=800&auto=format&fit=crop') center/cover no-repeat;
            border-radius: 20px;
            border: 4px solid #ca8a04;
            overflow: hidden;
            margin-bottom: 15px;
        }
        .hunt-hotspot {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border: 2px dashed #ff1744;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .hunt-hotspot:hover { transform: scale(1.2); background: rgba(255, 255, 255, 0.8); }

        /* POEM TIMELINE MATRIX */
        .timeline-flex {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 25px 0;
        }
        .timeline-card {
            background: #fef3c7;
            border: 2px solid #f59e0b;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: grab;
        }

        .feedback-banner {
            min-height: 50px;
            font-size: 1.4rem;
            font-weight: bold;
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
        }
        .correct-flash { color: #16a34a; background: #dcfce7; }
        .wrong-flash { color: #dc2626; background: #fee2e2; }

        /* CONFETTI GRAPHIC GENERATOR */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #f59e0b;
            position: absolute;
            animation: fall 2s linear infinite;
            top: -10px;
        }
        @keyframes fall {
            to { transform: translateY(550px) rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- STAGE 1: EXCLUSIVE 5-SECOND INNOVINE SPLASH LOGO -->
    <div id="splash">
        <img src="assets/innovine-logo.png" alt="Innovine Logo">
    </div>

    <!-- MAIN GAME CANVAS FRAMEWORK -->
    <div class="game-window hidden" id="mainframe">
        
        <!-- MODULE 0: WELCOME SCREEN -->
        <div id="screen-welcome">
            <h1>हिंदी मात्रा ज्ञान</h1>
            <h2>कक्षा - 1 (विषय: हिंदी)</h2>
            <div class="subtitle">अध्याय 3 – 'आ' (ा) की मात्रा</div>
            
            <!-- Animated SVG Avatar for Grandpupil Welcome -->
            <div style="font-size: 6rem; animation: bouncePulse 2s infinite;">👵🌾🏡</div>
            <p class="subtitle" style="margin-top:15px;">आओ बच्चों, एक सुंदर गाँव की सैर करें और 'आ' की मात्रा सीखें!</p>
            <button class="btn-main" onclick="nextSection(1)">खेल शुरू करें ➜</button>
        </div>

        <!-- STAGES FRAME GAMEPLAY CONTAINER -->
        <div id="screen-gameplay" class="hidden">
            <div class="hud">
                <span id="hud-activity-name">गतिविधि 1</span>
                <span id="hud-stars">⭐ सितारे: 0</span>
            </div>

            <div id="activity-node-root">
                <!-- Interactive Dynamic Activity Content Injected Here by Core System -->
            </div>

            <div id="feedback-tray" class="feedback-banner"></div>
        </div>

        <!-- FINAL SCOREBOARD PANEL -->
        <div id="screen-scoreboard" class="hidden">
            <h1>🎉 अद्भुत! बधाई हो! 🎉</h1>
            <div style="font-size: 5rem; margin: 20px 0;">🏆👑🌈</div>
            <h2>आपने 'आ' की मात्रा के सभी खेल पूरे कर लिए हैं!</h2>
            <div class="subtitle" style="font-size: 1.8rem; color:#16a34a;" id="final-star-tally">कुल सितारे: 0</div>
            <button class="btn-main" onclick="location.reload()">फिर से खेलें 🔄</button>
        </div>

    </div>

    <!-- AUDIO INFRASTRUCTURE WIRED TO ASSETS -->
    <audio id="sound-correct" src="assets/correct.mp3" preload="auto"></audio>
    <audio id="sound-wrong" src="assets/wrong.mp3" preload="auto"></audio>
    <audio id="sound-clap" src="assets/clap.mp3" preload="auto"></audio>

    <script>
        // Splash Engine Core Handler
        setTimeout(() => {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('mainframe').classList.remove('hidden');
        }, 5000);

        // Core Game Engine Global Variables
        let currentActivityIndex = 1;
        let scoreStars = 0;
        let runningRoundCounter = 1;
        let targetHuntItems = ['आम', 'आग', 'आटा', 'आदमी'];
        let itemsHuntedCount = 0;

        // Activity Node Orchestration Map
        function nextSection(activityId) {
            currentActivityIndex = activityId;
            document.getElementById('screen-welcome').classList.add('hidden');
            document.getElementById('screen-gameplay').classList.remove('hidden');
            document.getElementById('screen-scoreboard').classList.add('hidden');
            clearFeedbackTray();

            const root = document.getElementById('activity-node-root');
            root.innerHTML = '';

            switch(activityId) {
                case 1: startFindAaActivity(); break;
                case 2: startPictureMatchActivity(); break;
                case 3: startCompleteWordActivity(); break;
                case 4: startListenChooseActivity(); break;
                case 5: startPictureHuntActivity(); break;
                case 6: startCirclePictureActivity(); break;
                case 7: startReadFlashcardActivity(); break;
                case 8: startPoemSequenceActivity(); break;
                case 9: startCompetencyQuizActivity(); break;
                default: displayScoreboard(); break;
            }
        }

        function updateHUD(name) {
            document.getElementById('hud-activity-name').innerText = name;
            document.getElementById('hud-stars').innerText = `⭐ सितारे: ${scoreStars}`;
        }

        function clearFeedbackTray() {
            const tray = document.getElementById('feedback-tray');
            tray.innerText = '';
            tray.className = 'feedback-banner';
        }

        function playSound(id) {
            try {
                const audio = document.getElementById(id);
                audio.currentTime = 0;
                audio.play().catch(()=>{});
            } catch(e){}
        }

        function triggerConfetti() {
            for(let i=0; i<30; i++) {
                let div = document.createElement('div');
                div.className = 'confetti';
                div.style.left = Math.random() * 100 + '%';
                div.style.background = ['#f43f5e','#eab308','#3b82f6','#10b981'][Math.floor(Math.random()*4)];
                div.style.animationDelay = Math.random() * 2 + 's';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 2000);
            }
        }

        function giveRewardEffects(isClap = false) {
            scoreStars += 10;
            updateHUD(document.getElementById('hud-activity-name').innerText);
            playSound('sound-correct');
            if(isClap) playSound('sound-clap');
            triggerConfetti();
            const tray = document.getElementById('feedback-tray');
            tray.innerText = "🎈 बहुत बढ़िया! सही उत्तर।";
            tray.className = "feedback-banner correct-flash";
        }

        function giveWrongEffects(customMsg = "गलत उत्तर, फिर से प्रयास करें।") {
            playSound('sound-wrong');
            const tray = document.getElementById('feedback-tray');
            tray.innerText = `⚠️ ${customMsg}`;
            tray.className = "feedback-banner wrong-flash";
        }

        /* ACTIVITY 1: FIND THE "आ" (10 ROUNDS) */
        function startFindAaActivity() {
            updateHUD(`गतिविधि 1: आ खोजो (दौर: ${runningRoundCounter}/10)`);
            const root = document.getElementById('activity-node-root');
            root.innerHTML = `<h3>नीचे दिए गए अक्षरों में से "आ" पर क्लिक करो:</h3>`;
            
            const pools = ['अ', 'आ', 'इ', 'ई', 'उ', 'ऊ', 'ए', 'ऐ'];
            // Shuffle Pool Mix
            pools.sort(() => Math.random() - 0.5);

            const grid = document.createElement('div');
            grid.className = 'letter-pool';

            pools.forEach(letter => {
                const btn = document.createElement('button');
                btn.className = 'bubble-card';
                btn.innerText = letter;
                btn.onclick = () => {
                    if(letter === 'आ') {
                        giveRewardEffects(true);
                        setTimeout(() => {
                            if(runningRoundCounter < 10) {
                                runningRoundCounter++;
                                startFindAaActivity();
                            } else {
                                runningRoundCounter = 1;
                                nextSection(2);
                            }
                        }, 1500);
                    } else {
                        giveWrongEffects("यह 'आ' नहीं है! ध्यान से खोजें।");
                    }
                };
                grid.appendChild(btn);
            });
            root.appendChild(grid);
        }

        /* ACTIVITY 2: PICTURE MATCH (DRAG AND DROP) */
        function startPictureMatchActivity() {
            updateHUD("गतिविधि 2: चित्र का शब्द से मिलान");
            const root = document.getElementById('activity-node-root');
            root.innerHTML = `<h3>शब्द को सही चित्र के बॉक्स में ड्रैग (Drag) करें:</h3>`;

            const data = [
                { word: 'आम', img: '🍋' },
                { word: 'आग', img: '🔥' },
                { word: 'आलू', img: '🥔' }
            ];

            const container = document.createElement('div');
            container.className = 'matching-matrix';

            // Elements Source Panel
            const sourceBox = document.createElement('div');
            sourceBox.className = 'drag-box';
            sourceBox.innerHTML = '<strong>शब्द सूची</strong>';
            data.forEach(item => {
                const dItem = document.createElement('div');
                dItem.className = 'drag-item';
                dItem.innerText = item.word;
                dItem.draggable = true;
                dItem.id = `drag-${item.word}`;
                dItem.ondragstart = (e) => e.dataTransfer.setData("text", e.target.id);
                sourceBox.appendChild(dItem);
            });

            // Target Panel
            const targetsContainer = document.createElement('div');
            targetsContainer.style.display = 'flex';
            targetsContainer.style.gap = '15px';

            data.sort(() => Math.random() - 0.5).forEach(item => {
                const targetNode = document.createElement('div');
                targetNode.className = 'drop-target';
                targetNode.innerHTML = `<span class="picture-node">${item.img}</span><br>यहाँ ड्रॉप करें`;
                targetNode.ondragover = (e) => e.preventDefault();
                targetNode.ondrop = (e) => {
                    e.preventDefault();
                    const id = e.dataTransfer.getData("text");
                    if(id === `drag-${item.word}`) {
                        targetNode.style.background = '#dcfce7';
                        targetNode.innerHTML = `<span class="picture-node">${item.img}</span><br><strong>${item.word}</strong>`;
                        document.getElementById(id).remove();
                        giveRewardEffects();
                        if(sourceBox.children.length === 1) { // Only title left
                            setTimeout(() => nextSection(3), 2000);
                        }
                    } else {
                        giveWrongEffects("गलत मिलान! सही चित्र पर ड्रैग करें।");
                    }
                };
                targetsContainer.appendChild(targetNode);
            });

            container.appendChild(sourceBox);
            container.appendChild(targetsContainer);
            root.appendChild(container);
        }

        /* ACTIVITY 3: COMPLETE THE WORD (ा मात्रा) */
        function startCompleteWordActivity() {
            updateHUD("गतिविधि 3: सही मात्रा चुनकर शब्द पूरा करो");
            const dataSet = [
                { display: 'च_य', correct: 'ा', word: 'चाय' },
                { display: 'का_ल', correct: 'ा', word: 'काजल' },
                { display: 'बा_दल', correct: 'ा', word: 'बादल' }
            ];
            const currentItem = dataSet[Math.floor(Math.random() * dataSet.length)];

            const root = document.getElementById('activity-node-root');
            root.innerHTML = `<h3>खाली स्थान में आने वाली सही मात्रा चुनें:</h3>
                              <div style="font-size:3rem; margin:20px; font-weight:bold; letter-spacing:5px;">${currentItem.display}</div>`;

            const options = ['ा', 'ि', 'ी', 'ु'];
            const grid = document.createElement('div');
            grid.className = 'options-grid';

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'bubble-card';
                btn.innerText = opt;
                btn.onclick = () => {
                    if(opt === currentItem.correct) {
                        giveRewardEffects(true);
                        root.innerHTML += `<div style="font-size:2rem; color:#16a34a; font-weight:bold;">पूर्ण शब्द: ${currentItem.word}</div>`;
                        setTimeout(() => nextSection(4), 2000);
                    } else {
                        giveWrongEffects("यह गलत मात्रा है! 'आ' की मात्रा (ा) चुनें।");
                    }
                };
                grid.appendChild(btn);
            });
            root.appendChild(grid);
        }

        /* ACTIVITY 4: LISTEN AND CHOOSE */
        let listenRound = 1;
        const audioPrompts = [
            { txt: 'आम', img: '🍋', wrong: '🚗' },
            { txt: 'आग', img: '🔥', wrong: '🏠' },
            { txt: 'आलू', img: '🥔', wrong: '🍍' },
            { txt: 'आकाश', img: '☁️', wrong: '🌾' }
        ];
        function startListenChooseActivity() {
            updateHUD(`गतिविधि 4: सुनो और चुनो (दौर: ${listenRound}/4)`);
            const root = document.getElementById('activity-node-root');
            const q = audioPrompts[listenRound - 1];

            root.innerHTML = `<h3>नीचे दिए गए लाउडस्पीकर बटन को दबाकर शब्द सुनें और सही चित्र चुनें:</h3>
                              <button class="btn-main" style="margin:15px;" onclick="speakText('${q.txt}')">🔊 शब्द सुनें</button>`;

            const grid = document.createElement('div');
            grid.className = 'options-grid';

            const opts = [
                { type: 'correct', val: q.img },
                { type: 'wrong', val: q.wrong }
            ].sort(() => Math.random() - 0.5);

            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'bubble-card';
                btn.style.fontSize = '4rem';
                btn.innerText = opt.val;
                btn.onclick = () => {
                    if(opt.type === 'correct') {
                        giveRewardEffects();
                        setTimeout(() => {
                            if(listenRound < 4) {
                                listenRound++;
                                startListenChooseActivity();
                            } else {
                                nextSection(5);
                            }
                        }, 2000);
                    } else {
                        giveWrongEffects("यह सही चित्र नहीं है! फिर से सुनकर प्रयास करें।");
                    }
                };
                grid.appendChild(btn);
            });
            root.appendChild(grid);
            // Automatic speech on load for assistive experience
            setTimeout(() => speakText(q.txt), 600);
        }

        function speakText(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'hi-IN';
                window.speechSynthesis.speak(utterance);
            }
        }

        /* ACTIVITY 5: PICTURE HUNT (VILLAGE MAP) */
        function startPictureHuntActivity() {
            updateHUD("गतिविधि 5: गाँव का चित्र शिकार (Picture Hunt)");
            const root = document.getElementById('activity-node-root');
            root.innerHTML = `<h3>गाँव की तस्वीर में छिपे इन शब्दों को ढूंढकर क्लिक करें: <br> 
                              <span style="color:#c2410c;">[${targetHuntItems.join(', ')}]</span></h3>`;

            const canvas = document.createElement('div');
            canvas.className = 'village-canvas';

            // Coordinates mapping elements inside responsive viewport representation
            const spots = [
                { name: 'आम', top: '15%', left: '20%', icon: '🍋' },
                { name: 'आग', top: '70%', left: '45%', icon: '🔥' },
                { name: 'आटा', top: '65%', left: '75%', icon: '🌾' },
                { name: 'आदमी', top: '40%', left: '60%', icon: '👨' }
            ];

            spots.forEach(spot => {
                const node = document.createElement('div');
                node.className = 'hunt-hotspot';
                node.style.top = spot.top;
                node.style.left = spot.left;
                node.innerText = spot.icon;
                node.onclick = () => {
                    if(targetHuntItems.includes(spot.name)) {
                        node.style.border = '4px solid #10b981';
                        node.style.background = '#dcfce7';
                        node.onclick = null; // Disable re-click
                        itemsHuntedCount++;
                        giveRewardEffects();
                        if(itemsHuntedCount === 4) {
                            setTimeout(() => nextSection(6), 2000);
                        }
                    }
                };
                canvas.appendChild(node);
            });

            root.appendChild(canvas);
        }

        /* ACTIVITY 6: CIRCLE THE CORRECT PICTURE */
        function startCirclePictureActivity() {
            updateHUD("गतिविधि 6: सही चित्र पर गोला लगाओ");
            const root = document.getElementById('activity-node-root');
            
            root.innerHTML = `<h3>लिखे हुए शब्द के लिए सही चित्र को चुनें:</h3>
                              <div style="font-size:2.5rem; color:#b91c1c; font-weight:bold; margin:10px;">शब्द: आग</div>`;

            const grid = document.createElement('div');
            grid.className = 'options-grid';

            const choices = [
                { icon: '🔥', correct: true },
                { icon: '🚗', correct: false },
                { icon: '🏠', correct: false }
            ].sort(() => Math.random() - 0.5);

            choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'bubble-card';
                btn.style.fontSize = '4.5rem';
                btn.innerText = choice.icon;
                btn.onclick = () => {
                    if(choice.correct) {
                        btn.style.borderColor = '#10b981';
                        btn.style.background = '#e6fffa';
                        giveRewardEffects(true);
                        setTimeout(() => nextSection(7), 2000);
                    } else {
                        giveWrongEffects("यह गलत चित्र है! 'आग' को पहचानें।");
                    }
                };
                grid.appendChild(btn);
            });
            root.appendChild(grid);
        }

        /* ACTIVITY 7: READ THE WORD (FLASH CARD) */
        let flashcardIndex = 0;
        const flashWords = ['आम', 'आना', 'आशा', 'ताल', 'काजल', 'पाठशाला'];
        function startReadFlashcardActivity() {
            updateHUD(`गतिविधि 7: शब्द पढ़ो (कार्ड: ${flashcardIndex + 1}/${flashWords.length})`);
            const root = document.getElementById('activity-node-root');

            root.innerHTML = `<h3>इस शब्द को ज़ोर से बोलकर पढ़ें:</h3>
                              <div style="background:#fff; border:4px solid #f59e0b; padding:40px; font-size:3.5rem; font-weight:bold; border-radius:20px; margin:20px 0; color:#1e3a8a;">
                                ${flashWords[flashcardIndex]}
                              </div>
                              <button class="btn-main" onclick="confirmRead()">मैंने पढ़ लिया 👍</button>`;
        }

        function confirmRead() {
            giveRewardEffects();
            setTimeout(() => {
                if(flashcardIndex < flashWords.length - 1) {
                    flashcardIndex++;
                    startReadFlashcardActivity();
                } else {
                    nextSection(8);
                }
            }, 1500);
        }

        /* ACTIVITY 8: POEM SEQUENCE (DRAG AND DROP) */
        function startPoemSequenceActivity() {
            updateHUD("गतिविधि 8: आम की कविता का क्रम लगाओ");
            const root = document.getElementById('activity-node-root');
            root.innerHTML = `<h3>कहानी/कविता के वाक्यों को सही क्रम में व्यवस्थित करें:</h3>`;

            const lines = [
                { id: 1, text: "🧑 मोहन आम लाया।" },
                { id: 2, text: "👵 दादी ने आम काटा।" },
                { id: 3, text: "👨‍👩‍👦 सबने मिलकर आम खाया।" }
            ];

            const flexContainer = document.createElement('div');
            flexContainer.className = 'timeline-flex';
            flexContainer.id = 'timeline-sortable';

            // Scramble for student manipulation task
            lines.sort(() => Math.random() - 0.5).forEach(line => {
                const card = document.createElement('div');
                card.className = 'timeline-card';
                card.innerText = line.text;
                card.draggable = true;
                card.dataset.id = line.id;
                
                card.ondragstart = (e) => {
                    e.dataTransfer.setData("text/plain", card.dataset.id);
                    window.draggedCardRef = card;
                };
                card.ondragover = (e) => e.preventDefault();
                card.ondrop = (e) => {
                    e.preventDefault();
                    if (window.draggedCardRef !== card) {
                        let allCards = Array.from(flexContainer.children);
                        let dragIdx = allCards.indexOf(window.draggedCardRef);
                        let dropIdx = allCards.indexOf(card);
                        if (dragIdx < dropIdx) {
                            flexContainer.insertBefore(window.draggedCardRef, card.nextSibling);
                        } else {
                            flexContainer.insertBefore(window.draggedCardRef, card);
                        }
                    }
                };
                flexContainer.appendChild(card);
            });

            root.appendChild(flexContainer);

            const verifyBtn = document.createElement('button');
            verifyBtn.className = 'btn-main';
            verifyBtn.innerText = 'क्रम की जाँच करें ✔️';
            verifyBtn.onclick = () => {
                const currentOrder = Array.from(flexContainer.children).map(c => parseInt(c.dataset.id));
                if(JSON.stringify(currentOrder) === JSON.stringify([1, 2, 3])) {
                    giveRewardEffects(true);
                    setTimeout(() => nextSection(9), 2000);
                } else {
                    giveWrongEffects("क्रम सही नहीं है! सोचें कि पहले आम कौन लाया, फिर किसने काटा।");
                }
            };
            root.appendChild(verifyBtn);
        }

        /* ACTIVITY 9: COMPETENCY QUIZ (10 QUESTIONS) */
        let quizIndex = 0;
        const quizQuestions = [
            { q: 'कौन सा शब्द "आ" से शुरू होता है?', opts: ['🍍 अनानास', '🚗 कार', '🏠 घर'], ans: '🍍 अनानास' },
            { q: 'आग का सही चित्र चुनें:', opts: ['🔥 आग', '☁️ आकाश', '🥔 आलू'], ans: '🔥 आग' },
            { q: 'आलू का सही चित्र पहचानें:', opts: ['🥔 आलू', '🌾 आटा', '🍋 आम'], ans: '🥔 आलू' },
            { q: '"क + ा + ज + ल" को जोड़ने पर क्या शब्द बनेगा?', opts: ['काजल', 'कल', 'कला'], ans: 'काजल' },
            { q: '"बाजार" शब्द में किस मात्रा का प्रयोग हुआ है?', opts: ['ा (आ की मात्रा)', 'ि (इ की मात्रा)', 'ी (ई की मात्रा)'], ans: 'ा (आ की मात्रा)' },
            { q: 'ताले के चित्र के लिए सही शब्द कौन सा है?', opts: ['ताला', 'ताल', 'तल'], ans: 'ताला' },
            { q: 'इनमें से कौन सा फल राजा कहलाता है और "आ" से शुरू होता है?', opts: ['आम', 'अंगूर', 'केला'], ans: 'आम' },
            { q: '"बादल" शब्द का पहला अक्षर क्या है?', opts: ['बा', 'दा', 'ल'], ans: 'बा' },
            { q: 'पाठशाला जाने के लिए सही शब्द कौन सा है?', opts: ['पाठशाला', 'घर', 'बाज़ार'], ans: 'पाठशाला' },
            { q: 'माला के चित्र के लिए सही शब्द चुनें:', opts: ['माला', 'माल', 'मल'], ans: 'माला' }
        ];

        function startCompetencyQuizActivity() {
            updateHUD(`गतिविधि 9: योग्यता प्रश्नोत्तरी (प्रश्न: ${quizIndex + 1}/10)`);
            const root = document.getElementById('activity-node-root');
            const currentQ = quizQuestions[quizIndex];

            root.innerHTML = `<h3>${currentQ.q}</h3>`;
            const grid = document.createElement('div');
            grid.className = 'options-grid';

            currentQ.opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'bubble-card';
                btn.style.fontSize = '1.5rem';
                btn.innerText = opt;
                btn.onclick = () => {
                    if(opt === currentQ.ans || opt.includes(currentQ.ans)) {
                        giveRewardEffects();
                        setTimeout(() => {
                            if(quizIndex < 9) {
                                quizIndex++;
                                startCompetencyQuizActivity();
                            } else {
                                nextSection(10); // Trigger completion state evaluation routing
                            }
                        }, 2000);
                    } else {
                        giveWrongEffects("गलत विकल्प! ध्यान से सोचकर सही उत्तर चुनें।");
                    }
                };
                grid.appendChild(btn);
            });
            root.appendChild(grid);
        }

        function displayScoreboard() {
            document.getElementById('screen-gameplay').classList.add('hidden');
            document.getElementById('screen-scoreboard').classList.remove('hidden');
            document.getElementById('final-star-tally').innerText = `कुल अर्जित सितारे: ⭐ ${scoreStars}`;
            playSound('sound-clap');
        }
    </script>
</body>
</html>
