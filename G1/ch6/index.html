<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>ऋ स्वर और मात्राएँ - खेल</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background-color: #f0fdf4; margin: 0; }
        #game-container { max-width: 800px; margin: 20px auto; padding: 20px; background: white; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #22c55e; color: white; border: none; border-radius: 10px; }
        .hidden { display: none; }
        .word-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .card { padding: 20px; border: 2px solid #22c55e; border-radius: 10px; cursor: pointer; font-size: 24px; }
    </style>
</head>
<body>

<div id="game-container">
    <img src="../assest/innovine-logo.png" alt="Logo" style="width: 150px;">
    <h1>ऋ स्वर और मात्राएँ खोजें</h1>
    
    <!-- स्तर 1: पहचान -->
    <div id="level-1">
        <p><strong>निर्देश:</strong> सही शब्द पर क्लिक करें जिसमें 'ऋ' की मात्रा है।</p>
        <div class="word-grid">
            <div class="card" onclick="check(true, 'मृग')">मृग</div>
            <div class="card" onclick="check(false, 'आम')">आम</div>
            <div class="card" onclick="check(true, 'वृक्ष')">वृक्ष</div>
            <div class="card" onclick="check(true, 'नृप')">नृप</div>
            <div class="card" onclick="check(false, 'घर')">घर</div>
            <div class="card" onclick="check(true, 'कृषक')">कृषक</div>
        </div>
    </div>

    <div id="result" class="hidden">
        <h2 id="msg"></h2>
        <button class="btn" onclick="location.reload()">फिर से खेलें</button>
    </div>
</div>

<audio id="clap" src="../assest/clap.mp3"></audio>
<audio id="wrong" src="../assest/wrong.mp3"></audio>

<script>
    let score = 0;
    function check(isCorrect, word) {
        if(isCorrect) {
            document.getElementById('clap').play();
            score++;
            alert("सही! " + word + " में 'ऋ' की मात्रा है।");
        } else {
            document.getElementById('wrong').play();
            alert("गलत, फिर से कोशिश करें!");
        }
        if(score >= 4) {
            document.getElementById('level-1').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('msg').innerText = "शाबाश! आपने सभी 'ऋ' शब्द पहचान लिए।";
        }
    }
</script>
</body>
</html>
