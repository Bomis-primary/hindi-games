<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ऋ स्वर और मात्राएँ - खेल</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body { 
            font-family: 'Arial', sans-serif; 
            text-align: center; 
            background: linear-gradient(135deg, #f0fdf4, #dcfce7); 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* 1. Splash Screen (5 Seconds Logo Display) */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.5s ease-in-out;
        }

        #splash-screen img {
            max-width: 260px;
            height: auto;
            margin-bottom: 20px;
        }

        .loader {
            width: 45px;
            height: 45px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #22c55e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 2. Main Game Wrapper */
        #game-container { 
            display: none; 
            width: 95%;
            max-width: 800px; 
            margin: 20px auto; 
            padding: 30px; 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }

        .top-logo {
            max-width: 160px;
            height: auto;
            margin-bottom: 15px;
        }

        h1 {
            color: #166534;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .instruction {
            font-size: 18px;
            color: #4b5563;
            margin-bottom: 25px;
        }

        .word-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
            margin-top: 20px; 
        }

        .card { 
            padding: 25px 15px; 
            border: 2px solid #22c55e; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 26px; 
            font-weight: bold;
            background: white;
            transition: all 0.2s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            background-color: #f0fdf4;
            box-shadow: 0 6px 12px rgba(34, 197, 94, 0.15);
        }

        .btn { 
            padding: 12px 28px; 
            font-size: 18px; 
            cursor: pointer; 
            background: #16a34a; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold;
            margin-top: 20px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- Audio Elements (Fixing Directory Path) -->
    <audio id="sound-clap" src="./assest/clap.mp3" preload="auto"></audio>
    <audio id="sound-wrong" src="./assest/wrong.mp3" preload="auto"></audio>

    <!-- 1. Splash Screen Section (5 Seconds) -->
    <div id="splash-screen">
        <img src="./assest/innovine-logo.png" alt="Innovine Logo">
        <div class="loader"></div>
    </div>

    <!-- 2. Master Game Platform -->
    <div id="game-container">
        <!-- Logo inside main container -->
        <img src="./assest/innovine-logo.png" alt="Innovine Logo" class="top-logo">
        
        <h1>ऋ स्वर और मात्राएँ खोजें</h1>
        
        <!-- LEVEL 1 -->
        <div id="level-1">
            <p class="instruction"><strong>निर्देश:</strong> सही शब्द पर क्लिक करें जिसमें 'ऋ' की मात्रा है।</p>
            <div class="word-grid">
                <div class="card" onclick="checkWord(true, 'मृग')">मृग</div>
                <div class="card" onclick="checkWord(false, 'आम')">आम</div>
                <div class="card" onclick="checkWord(true, 'वृक्ष')">वृक्ष</div>
                <div class="card" onclick="checkWord(true, 'नृप')">नृप</div>
                <div class="card" onclick="checkWord(false, 'घर')">घर</div>
                <div class="card" onclick="checkWord(true, 'कृषक')">कृषक</div>
            </div>
        </div>

        <!-- FINAL GAME END WRAPPER -->
        <div id="result-screen" class="hidden">
            <h2 id="msg" style="color: #16a34a; font-size: 30px; margin-bottom: 15px;"></h2>
            <button class="btn" onclick="location.reload()">फिर से खेलें</button>
        </div>
    </div>

    <script>
        let correctAnswersCount = 0;
        const totalRequired = 4; 

        const clapSnd = document.getElementById('sound-clap');
        const wrongSnd = document.getElementById('sound-wrong');

        // Splash screen handler (Exactly 5000 milliseconds display time)
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = 0;
                setTimeout(() => {
                    splash.style.display = 'none';
                    document.getElementById('game-container').style.display = 'block';
                }, 500);
            }, 5000);
        });

        function checkWord(isCorrect, wordElement) {
            if(isCorrect) {
                clapSnd.currentTime = 0;
                clapSnd.play().catch(() => {});
                
                correctAnswersCount++;
                alert("बिल्कुल सही! \"" + wordElement + "\" में 'ऋ' की मात्रा है।");
            } else {
                wrongSnd.currentTime = 0;
                wrongSnd.play().catch(() => {});
                
                alert("यह गलत उत्तर है, कृपया दोबारा प्रयास करें!");
            }

            if(correctAnswersCount >= totalRequired) {
                setTimeout(() => {
                    document.getElementById('level-1').classList.add('hidden');
                    document.getElementById('result-screen').classList.remove('hidden');
                    document.getElementById('msg').innerHTML = "अद्भुत प्रदर्शन! 🎉<br>आपने सभी 'ऋ' मात्रा वाले शब्दों को ढूंढ लिया है।";
                }, 500);
            }
        }
    </script>
</body>
</html>
